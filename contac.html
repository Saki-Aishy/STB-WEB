            <form class="contact-form" action="tu_backend.php" method="POST">
                <label for="nombre" class="sr-only">Nombre</label>
                <input type="text" id="nombre" name="nombre" class="form-control mb-3" placeholder="Nombre" required>

                <label for="email" class="sr-only">Correo</label>
                <input type="email" id="email" name="email" class="form-control mb-3" placeholder="Correo" required>

                <label for="asunto" class="sr-only">Asunto</label>
                <input type="text" id="asunto" name="asunto" class="form-control mb-3" placeholder="Asunto">

                <label for="mensaje" class="sr-only">Mensaje</label>
                <textarea id="mensaje" name="mensaje" class="form-control mb-3" placeholder="Mensaje" rows="5" required></textarea>

                <button type="button" id="enviar" class="btn btn-primary w-100">Enviar mensaje</button>        
            </form>

    <script>
        const btnEnviar = document.getElementById('enviar');
        const popup = document.getElementById('popup');

        btnEnviar.addEventListener('click', () => {
           
            popup.classList.add('show');
            
      
            setTimeout(() => {
                popup.classList.remove('show');
            }, 3000);
        });
