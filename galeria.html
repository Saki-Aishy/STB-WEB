<div class="member-panel" id="memberPanel">

    <button class="close-btn" onclick="cerrarPanel()">

        <i class="fa-solid fa-xmark"></i>

    </button>

    <img id="panelImg">

    <h2 id="panelNombre"></h2>

    <h4 id="panelRol"></h4>

    <p id="panelInfo"></p>

</div>

<script>

function mostrarMiembro(nombre,rol,info,img){

    document.getElementById("panelNombre").innerHTML=nombre;

    document.getElementById("panelRol").innerHTML=rol;

    document.getElementById("panelInfo").innerHTML=info;

    document.getElementById("panelImg").src=img;

    document.getElementById("memberPanel").classList.add("active");

}

function cerrarPanel(){

    document.getElementById("memberPanel").classList.remove("active");

}

</script>
